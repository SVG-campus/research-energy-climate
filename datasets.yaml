version: 1
pillar: research-energy-climate
title: "Energy & climate optimization"
streaming_preferred: true

huggingface:
  - repo_id: nyu-mml/glue
    config: cola
    split: train[:2%]
    streaming: true
    note: Tiny GLUE stream for CI / dataloader sanity — replace with domain datasets as charters land.

kaggle: []

search_keywords: [hourly electricity demand, ERA5 extract, carbon removal pilot]

reference_streams:
  - name: Copernicus Climate Data Store (ERA5)
    url: https://cds.climate.copernicus.eu
    note: Reanalysis grids for weather-linked energy scenarios (API key required).
  - name: OpenEI Utility Rate Database (reference)
    url: https://openei.org/wiki/Utility_Rate_Database
    note: Tariffs / benchmarks for techno-economic sanity checks.
